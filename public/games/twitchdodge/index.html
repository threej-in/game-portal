<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0b0b12; color: #e8e8f0;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    overflow: hidden; user-select: none;
    -webkit-user-select: none; -webkit-touch-callout: none;
  }
  #wrap {
    position: relative; width: 100vw; height: 100vh;
    height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; padding: 8px; box-sizing: border-box;
  }
  #gameArea {
    display: flex; align-items: center; justify-content: center;
    flex: 1 1 auto; min-height: 0; width: 100%;
  }
  #canvasWrap {
    position: relative;
    max-width: 100%; max-height: 100%;
    aspect-ratio: 4 / 3;
  }
  canvas#game {
    display: block; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, #14142a 0%, #07070d 80%);
    border: 1px solid #2a2a44; border-radius: 8px;
    cursor: none;
    box-sizing: border-box;
  }
  canvas#game.showPointer { cursor: pointer; }
  #pad {
    display: none;
    height: 26dvh;
    aspect-ratio: 4 / 3;
    max-width: calc(100vw - 16px);
    flex: 0 0 auto;
    background: #10101c;
    border: 1px solid #2a2a44;
    border-radius: 8px;
    position: relative;
    touch-action: none;
    transition: box-shadow 0.4s, border-color 0.4s;
  }
  #pad.untouched {
    animation: padPulse 2.4s ease-in-out infinite;
  }
  @keyframes padPulse {
    0%, 100% {
      box-shadow: 0 0 8px rgba(120, 255, 170, 0.15), inset 0 0 12px rgba(120, 255, 170, 0.05);
      border-color: rgba(120, 255, 170, 0.3);
    }
    50% {
      box-shadow: 0 0 28px rgba(120, 255, 170, 0.5), inset 0 0 22px rgba(120, 255, 170, 0.15);
      border-color: rgba(120, 255, 170, 0.7);
    }
  }
  #pad::before {
    content: 'touch here to move';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #3a3a55; font-size: 12px; letter-spacing: 2px;
    pointer-events: none;
  }
  #padDot {
    position: absolute;
    width: 14px; height: 14px;
    margin-left: -7px; margin-top: -7px;
    border-radius: 50%;
    background: #7fe8ff;
    box-shadow: 0 0 12px #7fe8ff;
    pointer-events: none;
    display: none;
  }
  #hud {
    position: absolute; top: 16px; left: 0; right: 0;
    text-align: center; font-size: 14px; letter-spacing: 2px;
    pointer-events: none; text-shadow: 0 0 8px #000;
  }
  #hud.hidden { display: none; }
  #score { font-size: 28px; font-weight: bold; }
  #msg {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; pointer-events: none;
    overflow: hidden;
    padding-bottom: 90px;
  }
  #msg h1 { font-size: 32px; margin: 0 0 20px; letter-spacing: 4px; }
  #msg p { margin: 8px 0; opacity: 0.8; font-size: 13px; }
  #diffBtns {
    display: flex; gap: 8px; margin-top: 14px; pointer-events: auto;
  }
  #diffBtns button {
    background: transparent; color: #8888a0;
    border: 1px solid #33334a; border-radius: 6px;
    padding: 8px 18px; font-family: inherit; font-size: 12px;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
  }
  #diffBtns button.active {
    background: #1a1a2e; color: #7fe8ff; border-color: #7fe8ff;
  }
  #diffBtns button:hover { border-color: #66667a; color: #e8e8f0; }
  body.is-mobile #diffBtns button { padding: 7px 14px; font-size: 11px; }
  #legend {
    position: absolute;
    bottom: 16px; left: 0; right: 0;
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 6px 20px;
    font-size: 12px; opacity: 0.85; letter-spacing: 2px;
    justify-content: center;
  }
  #legend .row { display: flex; align-items: center; gap: 6px; }
  .dot-svg { flex-shrink: 0; }
  .legend-rainbow { animation: legendRainbow 2s linear infinite; }
  @keyframes legendRainbow {
    0% { fill: #ff3366; } 16% { fill: #ffcc00; } 33% { fill: #33ff66; }
    50% { fill: #00ccff; } 66% { fill: #3333ff; } 83% { fill: #ff00cc; }
    100% { fill: #ff3366; }
  }
  #gearBtn {
    position: absolute;
    top: 12px; right: 12px;

    background: rgba(10, 10, 20, 0.6);
    color: #8888a0;
    border: 1px solid #33334a;
    border-radius: 50%;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    box-sizing: border-box;
    z-index: 10;
  }
  #gearBtn:hover { background: #1a1a2e; border-color: #66667a; color: #e8e8f0; }
  #gearBtn.hidden { display: none; }
  #fsBtn {
    position: absolute;
    top: 12px; right: 56px;
    width: 40px; height: 40px;
    background: rgba(10, 10, 20, 0.6);
    color: #8888a0;
    border: 1px solid #33334a;
    border-radius: 50%;
    font-size: 16px;
    line-height: 1;

  }
  #fsBtn:hover { background: #1a1a2e; border-color: #66667a; color: #e8e8f0; }
  #fsBtn.hidden { display: none; }
  body.is-mobile #fsBtn { width: 38px; height: 38px; font-size: 14px; right: 50px; }
  #soundBtn {
    position: absolute;
    top: 12px; left: 12px;
    width: 40px; height: 40px;
    background: rgba(10, 10, 20, 0.6);
    color: #8888a0;
    border: 1px solid #33334a;
    border-radius: 50%;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    box-sizing: border-box;
    z-index: 10;
  }
  #soundBtn:hover { background: #1a1a2e; border-color: #66667a; color: #e8e8f0; }
  #soundBtn.hidden { display: none; }
  body.is-mobile #soundBtn { width: 38px; height: 38px; font-size: 16px; }
  #musicBtn {
    position: absolute;
    top: 12px; left: 56px;
    width: 40px; height: 40px;
    background: rgba(10, 10, 20, 0.6);
    color: #8888a0;
    border: 1px solid #33334a;
    border-radius: 50%;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    box-sizing: border-box;
    z-index: 10;
  }
  #musicBtn { overflow: hidden; }
  #musicBtn.off::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 28px; height: 3px;
    background: #ff3860;
    border-radius: 2px;
    transform: translate(-50%, -50%) rotate(-45deg);
  }
  #musicBtn:hover { background: #1a1a2e; border-color: #66667a; color: #e8e8f0; }
  #musicBtn.hidden { display: none; }
  body.is-mobile #musicBtn { width: 38px; height: 38px; font-size: 16px; left: 50px; }
  #pauseOverlay {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(10, 10, 20, 0.55);
    backdrop-filter: blur(1px);
    pointer-events: none;
    z-index: 5;
    border-radius: 8px;
  }
  #pauseOverlay.visible { display: flex; }
  #pauseOverlay .pausedText {
    font-size: 48px;
    letter-spacing: 8px;
    color: #e8e8f0;
    text-shadow: 0 0 16px rgba(127, 232, 255, 0.6), 0 0 32px rgba(127, 232, 255, 0.3);
    font-weight: bold;
  }
  body.is-mobile #pauseOverlay .pausedText { font-size: 28px; letter-spacing: 5px; }
  #settingsOverlay {
    position: fixed; inset: 0;
    background: rgba(5, 5, 12, 0.85);
    display: none;
    align-items: flex-start; justify-content: center;
    z-index: 100;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
  }
  #settingsOverlay.visible { display: flex; }
  #settingsPanel {
    background: #0f0f1c;
    border: 1px solid #2a2a44;
    border-radius: 10px;
    max-width: 520px;
    width: 100%;
    padding: 20px 24px 24px;
    color: #e8e8f0;
    font-family: inherit;
    font-size: 13px;
    margin: 0;
  }
  #settingsPanel .head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  #settingsPanel h2 {
    margin: 0; font-size: 18px; letter-spacing: 3px;
  }
  #settingsPanel .closeBtn {
    background: transparent; color: #e8e8f0;
    border: 1px solid #44445a; border-radius: 50%;
    width: 32px; height: 32px; font-size: 18px;
    cursor: pointer; line-height: 1;
  }
  #settingsPanel h3 {
    font-size: 12px; letter-spacing: 2px;
    color: #8888a0; margin: 18px 0 8px;
    border-bottom: 1px solid #22223a; padding-bottom: 4px;
  }
  .settingsTabs {
    display: flex; gap: 4px; margin-bottom: 14px;
  }
  .settingsTabs button {
    flex: 1; background: transparent; color: #8888a0;
    border: 1px solid #33334a; border-radius: 6px;
    padding: 8px 4px; font-family: inherit; font-size: 11px;
    letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
  }
  .settingsTabs button.active {
    background: #1a1a2e; color: #7fe8ff; border-color: #7fe8ff;
  }
  .settingsPage { display: none; }
  .settingsPage.active { display: block; }
  #settingsPanel .row {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 10px; align-items: center;
    margin: 8px 0;
  }
  #settingsPanel .row .label {
    display: flex; flex-direction: column;
  }
  #settingsPanel .row .lblText { font-size: 12px; }
  #settingsPanel .row .lblDefault {
    font-size: 10px; color: #666680; margin-top: 1px;
  }
  #settingsPanel .row input[type="range"] {
    grid-column: 2; width: 100%;
  }
  #settingsPanel .row .value {
    min-width: 70px; text-align: right;
    font-size: 11px; color: #aaaacc;
    font-variant-numeric: tabular-nums;
  }
  #settingsPanel .row input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: #7fe8ff;
  }
  #settingsPanel .row.noToggle .label {
    grid-column: 1 / 3;
  }
  #settingsPanel .row.noToggle input[type="range"] {
    grid-column: 1 / 3;
  }
  #settingsPanel .row.dim { opacity: 0.4; }
  #resetDefaults {
    margin-top: 20px;
    width: 100%;
    background: transparent;
    color: #e8e8f0;
    border: 1px solid #44445a;
    border-radius: 6px;
    padding: 10px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
  }
  #resetDefaults:hover { background: #1a1a2e; border-color: #66667a; }
  .hidden { display: none !important; }
  body.is-mobile #wrap {
    justify-content: flex-start;
    gap: 50px; padding: 30px 4px 16px;
  }
  body.is-mobile #gameArea { flex: 0 0 auto; }
  body.is-mobile #canvasWrap {
    max-width: calc(100vw - 8px);
    max-height: 55dvh;
  }
  body.is-mobile canvas#game {
    cursor: default;
  }
  body.is-mobile #pad { display: block; }
  body.is-mobile #hud { font-size: 11px; }
  body.is-mobile #score { font-size: 21px; }
  body.is-mobile #msg { padding-top: 20px; padding-bottom: 0; justify-content: flex-start; }
  body.is-mobile #msg h1 { font-size: 24px; margin: 0 0 10px; }
  body.is-mobile #msg p { font-size: 13px; margin: 5px 0; }
  body.is-mobile #msg p[style] { margin-top: 16px !important; }
  body.is-mobile #legend { font-size: 11px; bottom: 8px; gap: 4px 10px; }
  body.is-mobile #legend .row { gap: 4px; white-space: nowrap; }
  body.is-mobile .dot-svg { width: 28px; height: 16px; }
  body.is-mobile .dot { width: 15px; height: 15px; }
  body.is-mobile #gearBtn { width: 38px; height: 38px; font-size: 18px; }
  body.is-mobile #settingsPanel { font-size: 14px; padding: 20px 22px 24px; max-width: 92vw; }
  body.is-mobile #settingsPanel h2 { font-size: 22px; }
  body.is-mobile #settingsPanel h3 { font-size: 15px; }
  body.is-mobile #settingsPanel .row { gap: 12px; margin: 10px 0; }
  body.is-mobile #settingsPanel .row .lblText { font-size: 13px; white-space: nowrap; }
  body.is-mobile #settingsPanel .row .lblDefault { font-size: 11px; }
  body.is-mobile #settingsPanel .row .value { font-size: 13px; min-width: 90px; }
  body.is-mobile #settingsPanel .row input[type="checkbox"] { width: 22px; height: 22px; }
  body.is-mobile #settingsPanel .row input[type="range"] { height: 28px; }
  body.is-mobile #settingsPanel .closeBtn { width: 40px; height: 40px; font-size: 22px; }
  body.is-mobile #resetDefaults { font-size: 14px; padding: 12px; }
  body.is-mobile #settingsPanel #presetRow button { font-size: 12px !important; padding: 10px !important; }
  body.is-mobile #settingsBody > div { font-size: 22px !important; }
  body.is-mobile #settingsBody > div > button { font-size: 15px !important; padding: 10px 16px !important; }
</style>
</head>
<body>
<div id="wrap">
  <div id="gameArea">
    <div id="canvasWrap">
    <canvas id="game" width="800" height="600" class="showPointer"></canvas>
    <div id="hud" class="hidden">
      <div id="score">0</div>
      <div id="best">best: 0</div>
    </div>
    <div id="msg">
      <h1>DODGE</h1>
      <p>move with mouse / finger</p>
      <p>avoid the red. survive.</p>
      <p style="margin-top:16px; opacity:1">click to start</p>
      <div id="diffBtns">
        <button data-diff="easy">easy</button>
        <button data-diff="classic" class="active">classic</button>
        <button data-diff="hard">hard</button>
      </div>
      <div id="legend">
        <div class="row"><svg class="dot-svg" viewBox="0 0 36 20" width="36" height="20">
          <circle cx="18" cy="10" r="6" class="legend-rainbow"/>
          <circle cx="10" cy="5" r="1" fill="#ff6688" opacity="0.7"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.8s" repeatCount="indefinite"/></circle>
          <circle cx="27" cy="6" r="1" fill="#66ffcc" opacity="0.6"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="0.7s" repeatCount="indefinite"/></circle>
          <circle cx="25" cy="15" r="1" fill="#6688ff" opacity="0.7"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.9s" repeatCount="indefinite"/></circle>
          <circle cx="12" cy="16" r="0.8" fill="#ffcc44" opacity="0.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.6s" repeatCount="indefinite"/></circle>
        </svg>invincible</div>
        <div class="row"><svg class="dot-svg" viewBox="0 0 36 20" width="36" height="20">
          <circle cx="6" cy="10" r="2" fill="#4ef58a" opacity="0.15"/>
          <circle cx="9" cy="10" r="2.3" fill="#4ef58a" opacity="0.25"/>
          <circle cx="13" cy="10" r="2.6" fill="#4ef58a" opacity="0.35"/>
          <circle cx="18" cy="10" r="6" fill="#4ef58a"/>
        </svg>slow</div>
        <div class="row"><svg class="dot-svg" viewBox="0 0 36 20" width="36" height="20">
          <ellipse cx="18" cy="10" rx="14" ry="3" fill="none" stroke="#e84af5" stroke-width="1" opacity="0.35"/>
          <ellipse cx="18" cy="10" rx="11" ry="2.2" fill="none" stroke="#e84af5" stroke-width="1.2" opacity="0.5"/>
          <circle cx="18" cy="10" r="6" fill="#e84af5"/>
        </svg>repel / attract</div>
        <div class="row"><svg class="dot-svg" viewBox="0 0 36 20" width="36" height="20">
          <circle cx="16" cy="10" r="6" fill="#4488ff"/>
          <path d="M22 10 Q24 7 27 5" fill="none" stroke="#999" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="27" cy="5" r="1.5" fill="#ff6622"><animate attributeName="r" values="1;2;1" dur="0.4s" repeatCount="indefinite"/></circle>
        </svg>bomb</div>
        <div class="row"><svg class="dot-svg" viewBox="0 0 36 20" width="36" height="20">
          <circle cx="18" cy="10" r="10" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.25"><animate attributeName="r" values="8;12;8" dur="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.1;0.4" dur="1.2s" repeatCount="indefinite"/></circle>
          <circle cx="18" cy="10" r="6" fill="#e0e6f0"/>
        </svg>shield</div>
        <div class="row"><svg class="dot-svg" viewBox="0 0 36 20" width="36" height="20">
          <g opacity="0.7"><line x1="9" y1="4" x2="11" y2="4" stroke="#fffae0" stroke-width="0.8"/><line x1="10" y1="3" x2="10" y2="5" stroke="#fffae0" stroke-width="0.8"/></g>
          <g opacity="0.6"><line x1="27" y1="5" x2="29" y2="5" stroke="#fffae0" stroke-width="0.8"/><line x1="28" y1="4" x2="28" y2="6" stroke="#fffae0" stroke-width="0.8"/></g>
          <g opacity="0.5"><line x1="8" y1="14" x2="10" y2="14" stroke="#fffae0" stroke-width="0.8"/><line x1="9" y1="13" x2="9" y2="15" stroke="#fffae0" stroke-width="0.8"/></g>
          <g opacity="0.65"><line x1="27" y1="15" x2="29" y2="15" stroke="#fffae0" stroke-width="0.8"/><line x1="28" y1="14" x2="28" y2="16" stroke="#fffae0" stroke-width="0.8"/></g>
          <g opacity="0.5"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="0.9s" repeatCount="indefinite"/><line x1="30" y1="10" x2="32" y2="10" stroke="#fffae0" stroke-width="0.8"/><line x1="31" y1="9" x2="31" y2="11" stroke="#fffae0" stroke-width="0.8"/></g>
          <circle cx="18" cy="10" r="6" fill="#ffd24a"/>
        </svg>coin</div>
      </div>
    </div>
    <button id="gearBtn" title="settings">⚙</button>
    <button id="fsBtn" title="fullscreen"><svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor"><path d="M3 3h5v2H5v3H3zm9 0h5v5h-2V5h-3zM3 12v5h5v-2H5v-3zm12 0h2v5h-5v-2h3v-3z"/></svg></button>
    <button id="soundBtn" title="toggle sound">🔊</button>
    <button id="musicBtn" title="toggle music">🎵</button>
    <div id="pauseOverlay"><div class="pausedText">PAUSED</div></div>
    </div>
  </div>
  <div id="pad"><div id="padDot"></div></div>
</div>

<div id="settingsOverlay">
  <div id="settingsPanel">
    <div class="head">
      <h2>SETTINGS</h2>
      <button class="closeBtn" id="closeSettings">×</button>
    </div>
    <div id="settingsBody"></div>
    <button id="resetDefaults">reset to defaults</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

// Score slider steps: 0, 5K-50K by 5K, 75K-250K by 25K, 300K-1M by 50K
const SCORE_STEPS = [0];
for (let v = 5000; v <= 50000; v += 5000) SCORE_STEPS.push(v);
for (let v = 75000; v <= 250000; v += 25000) SCORE_STEPS.push(v);
for (let v = 300000; v <= 1000000; v += 50000) SCORE_STEPS.push(v);
function scoreToIndex(v) {
  let best = 0;
  for (let i = 0; i < SCORE_STEPS.length; i++) {
    if (Math.abs(SCORE_STEPS[i] - v) < Math.abs(SCORE_STEPS[best] - v)) best = i;
  }
  return best;
}
function formatScore(v) {
  if (v === 0) return 'instant';
  if (v >= 1000000) return '1M';
  if (v >= 1000) return (v/1000) + 'K';
  return v;
}

function refreshPresetRow() {
  const row = document.getElementById('presetRow');
  if (!row) return;
  const mode = currentMode();
  for (const btn of row.children) {
    const m = btn.dataset.mode;
    const isActive = mode === m;
    const clickable = m !== 'custom';
    btn.style.cssText = `flex:1;background:${isActive ? '#1a1a2e' : 'transparent'};color:${isActive ? '#7fe8ff' : '#e8e8f0'};border:1px solid ${isActive ? '#7fe8ff' : '#44445a'};border-radius:6px;padding:10px;font-family:inherit;font-size:12px;letter-spacing:2px;cursor:${clickable ? 'pointer' : 'default'};text-transform:uppercase;${!clickable && !isActive ? 'opacity:0.35;' : ''}`;
  }
  updateDiffBtns();
}

function updateDiffBtns() {
  const mode = currentMode();
  document.querySelectorAll('#diffBtns button').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.diff === mode);
  });
}
document.querySelectorAll('#diffBtns button').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const diff = btn.dataset.diff;
    if (!PRESETS[diff]) return;
    const keepDisplayMode = settings.displayMode;
    const keepTouchpad = { touchpadScale: settings.touchpadScale, touchpadGap: settings.touchpadGap, touchpadOffset: settings.touchpadOffset, canvasScale: settings.canvasScale, canvasVOffset: settings.canvasVOffset };
    const keepAudio = { sfxVolume: settings.sfxVolume, musicVolume: settings.musicVolume, musicEnabled: settings.musicEnabled, musicTrack: settings.musicTrack };
    settings = {...PRESETS[diff], displayMode: keepDisplayMode, ...keepTouchpad, ...keepAudio};
    saveSettings();
    bestEl.textContent = bestLabel();
    updateDiffBtns();
    initAudioCtx();
    start();
  });
});

function presetDefaultLabel(key, formatFn) {
  const classicVal = PRESETS.classic[key];
  const easyVal = PRESETS.easy[key];
  const hardVal = PRESETS.hard[key];
  let label = 'default: ' + formatFn(classicVal);
  const extras = [];
  if (easyVal !== classicVal) extras.push('easy ' + formatFn(easyVal));
  if (hardVal !== classicVal) extras.push('hard ' + formatFn(hardVal));
  if (extras.length > 0) label += ' (' + extras.join(', ') + ')';
  return label;
}

let settingsTab = 'gameplay';
function buildSettingsUI(tab) {
  if (tab) settingsTab = tab;
  const body = document.getElementById('settingsBody');
  body.innerHTML = '';

  // tab bar
  const tabs = document.createElement('div');
  tabs.className = 'settingsTabs';
  ['gameplay', 'sound', 'display'].forEach(t => {
    const btn = document.createElement('button');
    btn.textContent = t;
    if (t === settingsTab) btn.className = 'active';
    btn.addEventListener('click', e => { e.stopPropagation(); buildSettingsUI(t); });
    tabs.appendChild(btn);
  });
  body.appendChild(tabs);

  if (settingsTab === 'gameplay') {
    buildGameplayPage(body);
    if (paused) {
      // grey out gameplay controls during pause
      const notice = document.createElement('div');
      notice.style.cssText = 'text-align:center;color:#888;font-size:11px;letter-spacing:2px;padding:8px 0 4px;';
      notice.textContent = 'gameplay locked during pause';
      body.insertBefore(notice, tabs.nextSibling);
      // dim everything after the tabs and notice
      Array.from(body.children).forEach(el => {
        if (el !== tabs && el !== notice) {
          el.style.opacity = '0.3';
          el.style.pointerEvents = 'none';
        }
      });
    }
  }
  else if (settingsTab === 'sound') buildSoundPage(body);
  else if (settingsTab === 'display') buildDisplayPage(body);

  // dim reset button during pause
  const resetBtn = document.getElementById('resetDefaults');
  resetBtn.style.opacity = paused ? '0.3' : '';
  resetBtn.style.pointerEvents = paused ? 'none' : '';
}

function buildGameplayPage(body) {

  const presetHeader = document.createElement('h3');
  presetHeader.textContent = 'difficulty';

  body.appendChild(presetHeader);

  const presetRow = document.createElement('div');
  presetRow.style.cssText = 'display:flex;gap:8px;margin:8px 0 14px;';
  presetRow.id = 'presetRow';
  const modes = ['easy', 'classic', 'hard', 'custom'];
  for (const m of modes) {
    const btn = document.createElement('button');
    btn.textContent = m;
    btn.dataset.mode = m;
    const clickable = m !== 'custom';
    if (clickable) {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const keepDisplayMode = settings.displayMode;
        const keepTouchpad = { touchpadScale: settings.touchpadScale, touchpadGap: settings.touchpadGap, touchpadOffset: settings.touchpadOffset, canvasScale: settings.canvasScale, canvasVOffset: settings.canvasVOffset };
        const keepAudio = { sfxVolume: settings.sfxVolume, musicVolume: settings.musicVolume, musicEnabled: settings.musicEnabled, musicTrack: settings.musicTrack };
        settings = {...PRESETS[m], displayMode: keepDisplayMode, ...keepTouchpad, ...keepAudio};
        saveSettings();
        buildSettingsUI();
        bestEl.textContent = bestLabel();
      });
    }
    presetRow.appendChild(btn);
  }
  body.appendChild(presetRow);
  refreshPresetRow();

  // high score reset
  const hsHeader = document.createElement('h3');
  hsHeader.textContent = 'high scores';
  body.appendChild(hsHeader);

  const makeHsRow = (label, getValue, onReset) => {
    const row = document.createElement('div');
    row.style.display = 'flex';
    row.style.justifyContent = 'space-between';
    row.style.alignItems = 'center';
    row.style.margin = '6px 0';
    const lbl = document.createElement('div');
    lbl.style.fontSize = '12px';
    lbl.textContent = label + ': ' + getValue();

function stopMusic() {
  if (musicTimer !== null) {
    if (musicTimer !== true) clearTimeout(musicTimer);
    musicTimer = null;
  }
  if (musicOut && audioCtx) {
    // orphan old gain node so scheduled notes play into nothing
    musicOut.disconnect();
    musicOut = audioCtx.createGain();
    musicOut.gain.value = settings.musicVolume;
    musicOut.connect(audioCtx.destination);
  }
}

function mChip(freq, type, time, dur, vol) {
  const ac = audioCtx;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, time);
  g.gain.setValueAtTime(vol * 0.7, time + dur * 0.1);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  o.connect(g); g.connect(musicOut);
  o.start(time); o.stop(time + dur);
}
function mBass(freq, time, dur, vol) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  o.connect(g); g.connect(musicOut);
  o.start(time); o.stop(time + dur);
}
function mHat(time, vol) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const filt = audioCtx.createBiquadFilter(); filt.type = 'highpass'; filt.frequency.value = 7000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.035);
  src.connect(filt); filt.connect(g); g.connect(musicOut);
  src.start(time); src.stop(time + 0.04);
}
function mKick(time, vol) {
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, time);
  o.frequency.exponentialRampToValueAtTime(30, time + 0.12);
  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
  o.connect(g); g.connect(musicOut);
  o.start(time); o.stop(time + 0.15);
}

function startMusic() {
  stopMusic();
  if (!settings.musicEnabled) return;
  initAudioCtx();
  // If context isn't running yet, poll until it is
  if (audioCtx.state !== 'running') {
    let pollCount = 0;
    const poll = setInterval(() => {
      pollCount++;
      if (audioCtx.state === 'running') {
        clearInterval(poll);
        if (settings.musicEnabled && !musicTimer) startMusic();
      } else if (pollCount > 100) { // give up after 5s
        clearInterval(poll);
      }
    }, 50);
    return;
  }
  let trackKey = settings.musicTrack;
  if (trackKey === 'random') {
    const keys = Object.keys(MUSIC_TRACKS);
    trackKey = keys[Math.floor(Math.random() * keys.length)];
  }
  const track = MUSIC_TRACKS[trackKey];
  if (!track) return;
  musicOut.gain.value = settings.musicVolume;
  const step = 60 / track.bpm / 4;
  const barLen = step * 32;
  let nextBarTime = audioCtx.currentTime + 0.05;

  function scheduleBar() {
    if (!musicTimer) return;
    track.play(step, nextBarTime);
    nextBarTime += barLen;
    const delay = Math.max(50, (nextBarTime - audioCtx.currentTime - 0.2) * 1000);
    musicTimer = setTimeout(scheduleBar, delay);
  }
  musicTimer = true;
  scheduleBar();
}

function doExplode(x, y, radius, isBig, filled) {
  shockwaves.push({
    x, y,
    r: 4, maxR: radius * (isBig ? 1.4 : 1.05),
    life: 28, maxLife: 28,
    color: isBig ? '50, 180, 255' : '255, 170, 68',
    filled: !!filled
  });
  const now = gameNow();
  let killCount = 0;
  for (const e of enemies) {
    if (e.dead || e.kind !== 'normal') continue;
    const dx = e.x - x, dy = e.y - y;
    if (Math.hypot(dx, dy) < radius + e.r) {
      e.dead = true;
      scoreAccum += 100;
      killCount++;
      for (let i = 0; i < 10; i++) {
        particles.push({
          x: e.x, y: e.y,
          vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
          life: 25, color: '#ff3860'
        });
      }
      pendingChains.push({
        x: e.x, y: e.y,
        triggerTime: now + CHAIN_DELAY_MS
      });
    }
  }
  if (killCount > 0) {
    pushBurstText(x, y, killCount);
    playCrunchSound();
  }
}

function gameOver(killer) {
  running = false;
  paused = false;
  if (pendingPauseTimer) { clearTimeout(pendingPauseTimer); pendingPauseTimer = null; }
  document.getElementById('pauseOverlay').classList.remove('visible');
  if (score > currentBest()) {
    setCurrentBest(score);
    bestEl.textContent = bestLabel();
  }
  // clear all enemies except the one that killed the player
  if (killer) {
    killer.vx = 0;
    killer.vy = 0;
    enemies = [killer];
  } else {
    enemies = [];
  }
  // clear lingering visuals so the dead screen is uncluttered
  pendingChains = [];
  activeBlasts = [];
  shockwaves = [];
  // dramatic player explosion in player's cyan color
  for (let i = 0; i < 70; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 9;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 50 + Math.random() * 20,
      color: Math.random() < 0.7 ? '#7fe8ff' : '#b8f0ff'
    });
  }
  msg.querySelector('h1').textContent = 'DEAD';
  msg.querySelectorAll('p')[0].textContent = 'score: ' + score;
  msg.querySelectorAll('p')[1].textContent = bestLabel();
  msg.querySelectorAll('p')[2].textContent = 'click to retry';
  msg.classList.remove('hidden');
  updateDiffBtns();
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('gearBtn').classList.remove('hidden');
  document.getElementById('fsBtn').classList.remove('hidden');
  document.getElementById('soundBtn').classList.remove('hidden');
  document.getElementById('musicBtn').classList.remove('hidden');
  canvas.classList.add('showPointer');
}

function sampleBeta2_5() {
  // Beta(2,5) via gamma ratio. Gamma(k,1) = -sum of k log(uniform).
  const x = -Math.log(Math.random()) - Math.log(Math.random());
  const y = -Math.log(Math.random()) - Math.log(Math.random())
          - Math.log(Math.random()) - Math.log(Math.random()) - Math.log(Math.random());
  return x / (x + y);
}

function findCollectiblePosition() {
  const margin = collectibleRadius() + 20;
  const diagonal = Math.hypot(W, H);
  const refX = coinChain.lastX !== null ? coinChain.lastX : W/2;
  const refY = coinChain.lastY !== null ? coinChain.lastY : H/2;

  for (let attempt = 0; attempt < 50; attempt++) {
    const targetDist = sampleBeta2_5() * diagonal;
    const angle = Math.random() * Math.PI * 2;
    const x = refX + Math.cos(angle) * targetDist;
    const y = refY + Math.sin(angle) * targetDist;
    if (x < margin || x > W - margin) continue;
    if (y < margin || y > H - margin) continue;
    if (Math.hypot(x - player.x, y - player.y) < COLLECTIBLE_MIN_DIST_PLAYER) continue;
    if (Math.hypot(x - refX, y - refY) < COLLECTIBLE_MIN_DIST_PREV) continue;
    return {x, y};
  }
  // fallback — uniform random away from player
  for (let attempt = 0; attempt < 30; attempt++) {
    const x = margin + Math.random() * (W - margin*2);
    const y = margin + Math.random() * (H - margin*2);
    if (Math.hypot(x - player.x, y - player.y) >= COLLECTIBLE_MIN_DIST_PLAYER) {
      return {x, y};
    }
  }
  return { x: margin + Math.random() * (W - margin*2), y: margin + Math.random() * (H - margin*2) };
}

function updateCoinCollectible(now) {
  if (!coinChain.active) return;

  // spawn next collectible if none pending and delay has elapsed
  if (!coinCollectible && now >= coinChain.nextSpawnAt) {
    const idx = coinChain.nextCollectIndex;
    const N = COIN_VALUES.length;
    // linear interpolation from HOLD_START to HOLD_END
    const holdMs = COLLECTIBLE_HOLD_START_MS
      - (idx / (N - 1)) * (COLLECTIBLE_HOLD_START_MS - COLLECTIBLE_HOLD_END_MS);
    const pos = findCollectiblePosition();
    coinCollectible = {
      x: pos.x, y: pos.y,
      index: idx,
      createdAt: now,
      fadeInEnd: now + COLLECTIBLE_FADE_IN_MS,
      holdEnd: now + COLLECTIBLE_FADE_IN_MS + holdMs,
      fadeOutEnd: now + COLLECTIBLE_FADE_IN_MS + holdMs + COLLECTIBLE_FADE_OUT_MS,
    };
    coinChain.lastX = pos.x;
    coinChain.lastY = pos.y;
  }

  if (!coinCollectible) return;

  // collision check (active during any visible phase)
  const dx = coinCollectible.x - player.x;
  const dy = coinCollectible.y - player.y;
  if (Math.hypot(dx, dy) < collectibleRadius() + effectivePlayerRadius()) {
    // caught!
    const idx = coinCollectible.index;
    const value = COIN_VALUES[idx];
    scoreAccum += value;
    chainBonus += value;
    coinChain.collected.push(value);
    playCoinChainSound(idx);
    const fontSize = 20 + idx * 2;
    floatingTexts.push({
      x: coinCollectible.x, y: coinCollectible.y,
      text: '+' + value.toLocaleString(),
      color: '#ffd24a',
      life: 70, maxLife: 70,
      vy: -1.4, size: fontSize
    });
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: coinCollectible.x, y: coinCollectible.y,
        vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7,
        life: 38, color: '#ffd24a'
      });
    }
    coinCollectible = null;
    coinChain.nextCollectIndex = idx + 1;
    if (coinChain.nextCollectIndex >= COIN_VALUES.length) {
      // chain complete
      coinChain.active = false;
      coinChain.endedAt = now;
      coinChain.endedReason = 'complete';
      coinChain.nextCollectIndex = 0;
      completedChains++;
      floatingTexts.push({
        x: W/2, y: H/2,
        text: 'CHAIN COMPLETE!',
        color: '#ffd24a',
        life: 90, maxLife: 90,
        vy: -0.4, size: 42
      });
      playVictorySound();
    } else {
      coinChain.nextSpawnAt = now + COLLECTIBLE_DELAY_MS;
    }
    return;
  }

  // missed — fade-out window elapsed
  if (now >= coinCollectible.fadeOutEnd) {
    coinCollectible = null;
    coinChain.active = false;
    coinChain.endedAt = now;
    coinChain.endedReason = 'broken';
    coinChain.nextCollectIndex = 0;
    floatingTexts.push({
      x: W/2, y: H/2,
      text: 'CHAIN BROKEN',
      color: '#ff3860',
      life: 90, maxLife: 90,
      vy: -0.4, size: 36
    });
    playChainBrokenSound();
  }
}

function spawn() {
  // spawn from a random edge, aim near (but not exactly at) player
  const side = Math.floor(Math.random()*4);
  let x, y;
  if (side === 0) { x = Math.random()*W; y = -10; }
  else if (side === 1) { x = W+10; y = Math.random()*H; }
  else if (side === 2) { x = Math.random()*W; y = H+10; }
  else { x = -10; y = Math.random()*H; }

  // accuracy: 10 = perfectly aimed at player, 0 = totally random direction
  const a = settings.accuracy / 10;
  const rx = Math.random() * W, ry = Math.random() * H;
  const tx = player.x * a + rx * (1 - a);
  const ty = player.y * a + ry * (1 - a);
  const dx = tx - x, dy = ty - y;
  const d = Math.hypot(dx, dy) || 1;
  const effectiveStart = SPEED_BASE * settings.startSpeed;
  const effectiveMax = SPEED_BASE * Math.max(settings.maxSpeed, settings.startSpeed);
  const speedCap = effectiveMax - effectiveStart;
  const rampScore = Math.max(0, score - chainBonus);
  const speedProgress = settings.speedMaxScore === 0 ? 1 : Math.min(1, rampScore / settings.speedMaxScore);
  const baseSpeed = effectiveStart + speedCap * speedProgress;
  const roll = Math.random();
  let kind = 'normal';
  let cum = 0;
  // coin powerup is the only thing blocked during an active chain
  const chainActive = coinChain.active;
  if (settings.powerupInvin) {
    cum += settings.invinRateMult / 100;
    if (roll < cum) kind = 'invin';
  }
  if (kind === 'normal' && settings.powerupSlow) {
    cum += settings.slowRateMult / 100;
    if (roll < cum) kind = 'slow';
  }
  if (kind === 'normal' && settings.powerupShock) {
    cum += settings.shockRateMult / 100;
    if (roll < cum) kind = 'shock';
  }
  if (kind === 'normal' && settings.powerupShield) {
    cum += settings.shieldRateMult / 100;
    if (roll < cum) kind = 'shield';
  }
  if (kind === 'normal' && settings.powerupRepel) {
    cum += settings.repelRateMult / 100;
    if (roll < cum) kind = 'repel';
  }
  if (kind === 'normal' && settings.powerupCoin && !chainActive) {
    cum += settings.coinRateMult / 100;
    if (roll < cum) kind = 'coin';
  }
  let speedMult = 1;
  if (kind === 'invin') speedMult = 1.6;
  else if (kind === 'coin') speedMult = 1.8;
  const kindSpeed = baseSpeed * speedMult;
  const speed = kindSpeed * (0.8 + Math.random() * 0.4);
  const redRadius = settings.ballSize * (0.75 + Math.random() * 0.5);
  enemies.push({
    x, y,
    vx: dx/d*speed, vy: dy/d*speed,
    r: kind !== 'normal' ? 8 * powerScale() : redRadius,
    kind
  });
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  // trail grid (cheap vibe)
  ctx.fillStyle = 'rgba(10,10,20,0.35)';
  ctx.fillRect(0,0,W,H);

  if (running && !paused) {
    const rawNow = performance.now();
    let dtRemaining = rawNow - lastFrame;
    lastFrame = rawNow;
    // Cap total accumulated time to prevent spiral of death (e.g. tab in background)
    if (dtRemaining > 200) dtRemaining = 200;
    // Run multiple fixed-size steps to prevent slow devices from getting easier gameplay
    while (dtRemaining > 0 && running) {
    const dt = Math.min(dtRemaining, MAX_DT);
    dtRemaining -= dt;
    const frameScale = dt / REF_FRAME_MS;

    const now = gameNow();
    // attract: player chases cursor/target after unpause
    if (attractActive) {
      const adx = attractTargetX - player.x;
      const ady = attractTargetY - player.y;
      const adist = Math.hypot(adx, ady);
      if (adist < 2) {
        player.x = attractTargetX;
        player.y = attractTargetY;
        attractActive = false;
      } else {
        const move = ATTRACT_SPEED * (dt / 1000);
        const step = Math.min(move, adist);
        player.x += (adx / adist) * step;
        player.y += (ady / adist) * step;
      }
    }
    slowTimers = slowTimers.filter(t => t > now);
    // process any chain explosions whose delay has elapsed
    const readyChains = pendingChains.filter(c => c.triggerTime <= now);
    pendingChains = pendingChains.filter(c => c.triggerTime > now);
    for (const c of readyChains) {
      doExplode(c.x, c.y, CHAIN_RADIUS, false, true);
    }

    // active blast zones (bomb linger): catch any red inside
    activeBlasts = activeBlasts.filter(b => b.visualExpiresAt > now);
    for (const b of activeBlasts) {
      if (b.expiresAt <= now) continue; // collisions off, visual still drawing
      for (const e of enemies) {
        if (e.dead || e.kind !== 'normal') continue;
        const dx = e.x - b.x, dy = e.y - b.y;
        if (Math.hypot(dx, dy) < b.r + e.r) {
          e.dead = true;
          scoreAccum += 100;
          pushScoreText(e.x, e.y, 100);
          playCrunchSound();
          for (let i = 0; i < 10; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
              life: 25, color: '#ff3860'
            });
          }
          pendingChains.push({
            x: e.x, y: e.y,
            triggerTime: now + CHAIN_DELAY_MS
          });
        }
      }
    }
    let slowMult = 1;
    for (const t of slowTimers) {
      const rem = t - now;
      let contribution;
      if (rem >= SLOW_FADE_MS) {
        contribution = SLOW_FACTOR;
      } else {
        // ease from SLOW_FACTOR back to 1 during final second
        contribution = SLOW_FACTOR + (1 - SLOW_FACTOR) * (1 - rem / SLOW_FADE_MS);
      }
      slowMult *= contribution;
    }
    const invin = now < invincibleUntil;

    scoreAccum += (dt / 10);
    score = Math.floor(scoreAccum);
    scoreEl.textContent = score;

    spawnTimer -= frameScale;
    const effectiveStartMult = Math.max(0.01, settings.startSpawnRate);
    const effectiveMaxMult = Math.max(effectiveStartMult, settings.maxSpawnRate);
    const rampScore = Math.max(0, score - chainBonus);
    const spawnProgress = settings.spawnMaxScore === 0 ? 1 : Math.min(1, rampScore / settings.spawnMaxScore);
    // interpolate rate linearly, then convert to interval
    const currentRate = effectiveStartMult + (effectiveMaxMult - effectiveStartMult) * spawnProgress;
    const spawnInterval = SPAWN_INTERVAL_BASE / currentRate;
    if (spawnTimer <= 0) { spawn(); spawnTimer = spawnInterval; }

    // prune expired repel timers and compute active stack count
    repelTimers = repelTimers.filter(t => t > now);
    const repelStacks = repelTimers.length;

    for (const e of enemies) {
      e.x += e.vx * slowMult * frameScale;
      e.y += e.vy * slowMult * frameScale;
      // repel force: push reds away from player, pull powerups toward player.
      // while invincible, reds are ATTRACTED (they explode on contact = kill fodder).
      if (repelStacks > 0) {
        const rdx = e.x - player.x;
        const rdy = e.y - player.y;
        const dist = Math.hypot(rdx, rdy);
        if (dist > 0 && dist < REPEL_RADIUS) {
          const falloff = 1 - (dist / REPEL_RADIUS);
          const push = settings.repelStrength * repelStacks * falloff * 2.55 * frameScale;
          const sign = e.kind === 'normal' ? (invin ? -1 : 1) : -1;
          e.x += (rdx / dist) * push * sign;
          e.y += (rdy / dist) * push * sign;
        }
      }
      const dx = e.x - player.x, dy = e.y - player.y;
      if (Math.hypot(dx, dy) < e.r + effectivePlayerRadius()) {
        if (e.kind === 'invin') {
          if (invincibleUntil < now) invincibleTotal = 0;
          const MAX_INVIN = 15000;
          invincibleTotal = Math.min(MAX_INVIN, invincibleTotal + settings.invinDuration * 1000);
          const endTarget = Math.max(invincibleUntil, now) + settings.invinDuration * 1000;
          invincibleUntil = Math.min(endTarget, now + MAX_INVIN);
          e.dead = true;
          playInvinSound();
          scoreAccum += 250;
          pushScoreText(e.x, e.y, 250);
          for (let i = 0; i < 24; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7,
              life: 35, color: `hsl(${Math.random()*360},100%,65%)`
            });
          }
        } else if (e.kind === 'slow') {
          slowTimers.push(now + settings.slowDuration * 1000);
          e.dead = true;
          scoreAccum += 250;
          playSlowSound();
          pushScoreText(e.x, e.y, 250);
          for (let i = 0; i < 24; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
              life: 35, color: '#4ef58a'
            });
          }
        } else if (e.kind === 'shock') {
          e.dead = true;
          scoreAccum += 250;
          chainExplode(e.x, e.y, SHOCK_RADIUS, true);
          playBombSound();
          activeBlasts.push({
            x: e.x, y: e.y,
            r: SHOCK_RADIUS,
            expiresAt: now + BOMB_LINGER_MS,
            visualExpiresAt: now + BOMB_LINGER_MS + 200,
            maxLife: BOMB_LINGER_MS
          });
        } else if (e.kind === 'shield') {
          e.dead = true;
          playShieldPickupSound();
          if (shieldCount < settings.shieldLimit) {
            shieldCount++;
            scoreAccum += 250;
            pushScoreText(e.x, e.y, 250);
          } else {
            scoreAccum += 5000;
            chainBonus += 5000;
            pushScoreText(e.x, e.y, 5000);
          }
          for (let i = 0; i < 24; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
              life: 35, color: '#e0e6f0'
            });
          }
        } else if (e.kind === 'repel') {
          repelTimers.push(now + settings.repelDuration * 1000);
          e.dead = true;
          scoreAccum += 250;
          pushScoreText(e.x, e.y, 250);
          playRepelSound();
          for (let i = 0; i < 24; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
              life: 35, color: '#e84af5'
            });
          }
        } else if (e.kind === 'coin') {
          e.dead = true;
          scoreAccum += INITIAL_COIN_VALUE;
          playCoinBaseSound();
          floatingTexts.push({
            x: e.x, y: e.y,
            text: '+' + INITIAL_COIN_VALUE,
            color: '#ffd24a',
            life: 70, maxLife: 70,
            vy: -1.4, size: 22
          });
          for (let i = 0; i < 30; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7,
              life: 38, color: '#ffd24a'
            });
          }
          // start chain
          coinChain.active = true;
          coinChain.nextCollectIndex = 0;
          coinChain.collected = [INITIAL_COIN_VALUE];
          coinChain.lastX = e.x;
          coinChain.lastY = e.y;
          coinChain.nextSpawnAt = now + COLLECTIBLE_DELAY_MS;
          floatingTexts.push({
            x: W/2, y: H/2 - 60,
            text: 'COIN CHAIN!',
            color: '#ffd24a',
            life: 70, maxLife: 70,
            vy: -0.6, size: 36
          });
        } else if (invin) {
          e.dead = true;
          playPopSound();
          chainExplode(e.x, e.y, INVIN_BLAST_RADIUS, false);
        } else if (now < shieldGraceUntil) {
          // post-shield-hit grace period — reds pass through
          continue;
        } else if (shieldCount > 0) {
          e.dead = true;
          shieldCount--;
          shieldGraceUntil = now + settings.shieldGraceDuration;
          scoreAccum -= 500;
          pushPenaltyText(e.x, e.y, -500);
          playShieldAbsorbSound();
          // lost shield ring animation
          lostShields.push({
            x: player.x, y: player.y,
            r: player.r + 5 + shieldCount * 4,
            life: 35, maxLife: 35
          });
          for (let i = 0; i < 16; i++) {
            particles.push({
              x: e.x, y: e.y,
              vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
              life: 28, color: '#c8d0dc'
            });
          }
        } else {
          playDeathSound();
          gameOver(e);
          break;
        }
      }
    }
    enemies = enemies.filter(e => !e.dead && e.x > -30 && e.x < W+30 && e.y > -30 && e.y < H+30);

    // coin collectible update (spawn, collision, timeout)
    updateCoinCollectible(now);
    } // end while (dtRemaining > 0)
  }

  // draw enemies and game visuals (hidden during pause)
  const simActive = running && !paused;
  if (!paused) {
  const drawNow = gameNow();
  for (const e of enemies) {
    if (e.kind === 'shield') {
      // pulsing silver with expanding halo rings
      const pulse = 0.5 + 0.5 * Math.sin(drawNow / 90);
      const flashCol = `rgb(${216 + 39*pulse}, ${222 + 33*pulse}, ${233 + 22*pulse})`;
      // expanding halo ring
      const ringPhase = (drawNow % 1200) / 1200;
      const ringR = e.r + 4 + ringPhase * 18;
      ctx.beginPath();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2 * (1 - ringPhase);
      ctx.globalAlpha = 0.5 * (1 - ringPhase);
      ctx.arc(e.x, e.y, ringR, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // second ring offset
      const ringPhase2 = ((drawNow + 600) % 1200) / 1200;
      const ringR2 = e.r + 4 + ringPhase2 * 18;
      ctx.beginPath();
      ctx.lineWidth = 2 * (1 - ringPhase2);
      ctx.globalAlpha = 0.4 * (1 - ringPhase2);
      ctx.arc(e.x, e.y, ringR2, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // outer glow
      ctx.save();
      ctx.globalAlpha = 0.35 + 0.35 * pulse;
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 28 + 14 * pulse;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r + 3 + 2 * pulse, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      // core
      ctx.beginPath();
      ctx.fillStyle = flashCol;
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 22;
      ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      continue;
    }
    if (e.kind === 'invin') {
      const hue = (drawNow / 4) % 360;
      const col = `hsl(${hue}, 100%, 60%)`;
      // rainbow sparkles orbiting
      for (let i = 0; i < 6; i++) {
        const angle = (drawNow / 200) + i * Math.PI / 3;
        const dist = e.r + 6 + 3 * Math.sin(drawNow / 80 + i);
        const sx = e.x + Math.cos(angle) * dist;
        const sy = e.y + Math.sin(angle) * dist;
        const sparkHue = (hue + i * 60) % 360;
        ctx.beginPath();
        ctx.fillStyle = `hsl(${sparkHue}, 100%, 70%)`;
        ctx.globalAlpha = 0.5 + 0.4 * Math.sin(drawNow / 60 + i * 2);
        ctx.arc(sx, sy, 1.5 + Math.sin(drawNow / 50 + i) * 0.8, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      // core
      ctx.beginPath();
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 26;
      ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      continue;
    }
    if (e.kind === 'coin') {
      // gold sparkles
      const gp = 0.5 + 0.5 * Math.sin(drawNow / 150);
      for (let i = 0; i < 5; i++) {
        const angle = (drawNow / 300) + i * Math.PI * 2 / 5;
        const dist = e.r + 5 + 4 * Math.sin(drawNow / 100 + i * 1.5);
        const sx = e.x + Math.cos(angle) * dist;
        const sy = e.y + Math.sin(angle) * dist;
        ctx.save();
        ctx.globalAlpha = 0.6 + 0.35 * Math.sin(drawNow / 70 + i * 3);
        ctx.fillStyle = '#fffae0';
        ctx.translate(sx, sy);
        ctx.rotate(drawNow / 200 + i);
        const sr = 2 + Math.sin(drawNow / 50 + i) * 0.8;
        ctx.beginPath();
        for (let j = 0; j < 4; j++) {
          const a = j * Math.PI / 2;
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(a) * sr * 2.5, Math.sin(a) * sr * 2.5);
        }
        ctx.strokeStyle = '#fffae0';
        ctx.lineWidth = 1.3;
        ctx.stroke();
        ctx.restore();
      }
      // core
      ctx.beginPath();
      ctx.fillStyle = '#ffd24a';
      ctx.shadowColor = '#ffd24a';
      ctx.shadowBlur = 22 + 8 * gp;
      ctx.arc(e.x, e.y, e.r * (1 + 0.06 * gp), 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      continue;
    }
    if (e.kind === 'slow') {
      // green trail particles (draw a few dots behind based on velocity)
      const speed = Math.hypot(e.vx, e.vy);
      if (speed > 0.5) {
        const nx = -e.vx / speed, ny = -e.vy / speed;
        for (let i = 1; i <= 7; i++) {
          const tx = e.x + nx * i * 7;
          const ty = e.y + ny * i * 7;
          const jx = Math.sin(drawNow / 60 + i * 2) * 4;
          const jy = Math.cos(drawNow / 70 + i * 3) * 4;
          ctx.beginPath();
          ctx.globalAlpha = 0.65 * (1 - i / 8);
          ctx.fillStyle = '#4ef58a';
          ctx.arc(tx + jx, ty + jy, 5.5 - i * 0.5, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
      // core
      const sp = 0.5 + 0.5 * Math.sin(drawNow / 180);
      ctx.beginPath();
      ctx.fillStyle = '#4ef58a';
      ctx.shadowColor = '#4ef58a';
      ctx.shadowBlur = 22 + 8 * sp;
      ctx.arc(e.x, e.y, e.r * (1 + 0.06 * sp), 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      continue;
    }
    if (e.kind === 'shock') {
      // spinning bomb with fuse
      const angle = drawNow / 150;
      const fuseLen = e.r + 10;
      const fuseEndX = e.x + Math.cos(angle) * fuseLen;
      const fuseEndY = e.y + Math.sin(angle) * fuseLen;
      // fuse wick
      ctx.beginPath();
      ctx.strokeStyle = '#999';
      ctx.lineWidth = 1.2;
      ctx.moveTo(e.x + Math.cos(angle) * e.r, e.y + Math.sin(angle) * e.r);
      ctx.quadraticCurveTo(
        e.x + Math.cos(angle) * (e.r + 5) + Math.sin(angle) * 3,
        e.y + Math.sin(angle) * (e.r + 5) - Math.cos(angle) * 3,
        fuseEndX, fuseEndY
      );
      ctx.stroke();
      // small flame
      const sparkle = 0.5 + 0.5 * Math.sin(drawNow / 30);
      ctx.beginPath();
      ctx.fillStyle = `rgb(255, ${100 + 50 * sparkle}, ${20 * sparkle})`;
      ctx.shadowColor = '#ff4400';
      ctx.shadowBlur = 6 + 4 * sparkle;
      ctx.arc(fuseEndX, fuseEndY, 1.5 + 0.5 * sparkle, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      // core
      const bp = 0.5 + 0.5 * Math.sin(drawNow / 180);
      ctx.beginPath();
      ctx.fillStyle = '#4488ff';
      ctx.shadowColor = '#4488ff';
      ctx.shadowBlur = 22 + 8 * bp;
      ctx.arc(e.x, e.y, e.r * (1 + 0.05 * bp), 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      continue;
    }
    if (e.kind === 'repel') {
      // saturn-like ring
      const ringAngle = Math.sin(drawNow / 400) * 0.3;
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(ringAngle);
      ctx.beginPath();
      ctx.ellipse(0, 0, e.r + 8, 3, 0, 0, Math.PI*2);
      ctx.strokeStyle = '#e84af5';
      ctx.globalAlpha = 0.45 + 0.2 * Math.sin(drawNow / 120);
      ctx.lineWidth = 2;
      ctx.shadowColor = '#e84af5';
      ctx.shadowBlur = 10;
      ctx.stroke();
      // second ring
      ctx.beginPath();
      ctx.ellipse(0, 0, e.r + 12, 4.5, 0, 0, Math.PI*2);
      ctx.globalAlpha = 0.25 + 0.15 * Math.sin(drawNow / 150);
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      // core
      const rp = 0.5 + 0.5 * Math.sin(drawNow / 180);
      ctx.beginPath();
      ctx.fillStyle = '#e84af5';
      ctx.shadowColor = '#e84af5';
      ctx.shadowBlur = 22 + 8 * rp;
      ctx.arc(e.x, e.y, e.r * (1 + 0.06 * rp), 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
      continue;
    }
    // normal red ball
    ctx.beginPath();
    let col = '#ff3860';
    if (e.kind === 'normal' && drawNow < invincibleUntil - 250) col = '#ff80a0';
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 12;
    ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // bomb blast zones (lingering)
  const blastNow = gameNow();
  for (const b of activeBlasts) {
    const vrem = b.visualExpiresAt - blastNow;
    if (vrem <= 0) continue;
    const totalVisualLife = b.maxLife + 200;
    const p = vrem / totalVisualLife; // 1 → 0
    const eased = Math.sqrt(p); // hold strong, fade late
    // soft core
    ctx.fillStyle = `rgba(50, 180, 255, ${0.38 * eased})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fill();
    // inner hotter core
    ctx.fillStyle = `rgba(180, 230, 255, ${0.3 * eased})`;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 0.6, 0, Math.PI*2);
    ctx.fill();
  }

  // shockwaves
  for (const sw of shockwaves) {
    sw.r += (sw.maxR - sw.r) * 0.25;
    sw.life--;
    const a = Math.max(0, sw.life / sw.maxLife);
    if (sw.filled) {
      ctx.fillStyle = `rgba(${sw.color}, ${a * 0.25})`;
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.strokeStyle = `rgba(${sw.color}, ${a})`;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = `rgba(${sw.color}, ${a})`;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
      ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;
  shockwaves = shockwaves.filter(sw => sw.life > 0);

  // particles
  const simActive = running && !paused;
  for (const p of particles) {
    if (!paused) {
      p.x += p.vx; p.y += p.vy;
      if (simActive) {
        p.life--;
      } else if (!running) {
        // death freeze: decelerate rapidly, don't expire
        p.vx *= 0.92; p.vy *= 0.92;
      }
    }
    ctx.globalAlpha = Math.max(0, p.life/40);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 3, 3);
  }
  ctx.globalAlpha = 1;
  if (simActive) particles = particles.filter(p => p.life > 0);

  // floating texts (coin chain values, banners)
  for (const ft of floatingTexts) {
    if (simActive) { ft.y += ft.vy; ft.life--; }
    const a = Math.max(0, ft.life / ft.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = ft.color;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 12;
    ctx.font = `bold ${ft.size}px ui-monospace, Menlo, Consolas, monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  // coin collectible
  if (coinCollectible) {
    const now = gameNow();
    let alpha = 1;
    if (now < coinCollectible.fadeInEnd) {
      alpha = (now - coinCollectible.createdAt) / COLLECTIBLE_FADE_IN_MS;
    } else if (now >= coinCollectible.holdEnd) {
      alpha = Math.max(0, 1 - (now - coinCollectible.holdEnd) / COLLECTIBLE_FADE_OUT_MS);
    }
    const shimmer = 0.8 + 0.2 * Math.sin(now / 70);
    const rotation = now / 200;
    ctx.save();
    // timer halo — expands from coin radius at spawn, peaks mid-life, contracts back by fade-out end
    {
      const total = (coinCollectible.fadeOutEnd - coinCollectible.createdAt);
      const tNorm = (now - coinCollectible.createdAt) / total;
      if (tNorm >= 0 && tNorm <= 1) {
        const curve = Math.sin(tNorm * Math.PI); // 0 → 1 → 0
        const HALO_MAX = 42;
        const haloR = collectibleRadius() + curve * HALO_MAX;
        // halo alpha scales with the curve itself so it shrinks + fades in sync,
        // independent of the coin's own fade-in/fade-out
        ctx.globalAlpha = 0.55 * curve;
        ctx.strokeStyle = '#ffd24a';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#ffd24a';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.arc(coinCollectible.x, coinCollectible.y, haloR, 0, Math.PI*2);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
    // outer glow halo
    ctx.globalAlpha = alpha * 0.55 * shimmer;
    ctx.fillStyle = '#ffe680';
    ctx.shadowColor = '#ffd24a';
    ctx.shadowBlur = 22 + 10 * shimmer;
    ctx.beginPath();
    ctx.arc(coinCollectible.x, coinCollectible.y, collectibleRadius() + 6, 0, Math.PI*2);
    ctx.fill();
    // main gold body
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffd24a';
    ctx.shadowColor = '#ffd24a';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(coinCollectible.x, coinCollectible.y, collectibleRadius(), 0, Math.PI*2);
    ctx.fill();
    // highlight arc rotating for mario-coin feel
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255, 255, 220, ' + (alpha * shimmer) + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(coinCollectible.x, coinCollectible.y, collectibleRadius() - 3, rotation, rotation + Math.PI * 0.6);
    ctx.stroke();
    // inner bright dot
    ctx.globalAlpha = alpha * shimmer;
    ctx.fillStyle = '#fff7cc';
    ctx.beginPath();
    ctx.arc(coinCollectible.x - 2, coinCollectible.y - 2, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  } // end if (!paused) — hide game visuals during pause

  // attract target marker
  if (attractActive && running) {
    ctx.save();
    ctx.strokeStyle = '#7fe8ff';
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(performance.now() / 80);
    ctx.beginPath();
    ctx.moveTo(attractTargetX - 8, attractTargetY);
    ctx.lineTo(attractTargetX + 8, attractTargetY);
    ctx.moveTo(attractTargetX, attractTargetY - 8);
    ctx.lineTo(attractTargetX, attractTargetY + 8);
    ctx.stroke();
    ctx.restore();
  }

  // player
  if (running) {
    const now = gameNow();
    const remaining = invincibleUntil - now;
    const invin = remaining > 0;
    ctx.beginPath();
    let pcol = '#7fe8ff';
    let blur = 16;
    let radius = player.r;
    let alpha = 1;
    const repelActive = repelTimers.some(t => t > now);
    if (invin) {
      // rainbow flashing
      const hue = (now / 4) % 360;
      pcol = `hsl(${hue}, 100%, 60%)`;
      // fadeout in last 0.5s
      if (remaining < FADE_MS) alpha = remaining / FADE_MS;
      blur = 32 + Math.sin(now/40)*14;
      radius = effectivePlayerRadius();
      // outer halo
      ctx.save();
      ctx.globalAlpha = alpha * 0.5;
      ctx.fillStyle = `hsl(${(hue+120)%360}, 100%, 60%)`;
      ctx.shadowColor = pcol;
      ctx.shadowBlur = blur + 20;
      ctx.arc(player.x, player.y, radius + 6, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      ctx.beginPath();
    } else if (repelActive) {
      // shimmering purple
      const shimmer = 0.7 + 0.3 * Math.sin(now / 100);
      pcol = `rgb(${180 + 40 * shimmer}, ${80 + 30 * shimmer}, ${255})`;
      blur = 20 + 8 * shimmer;
    }
    // shield grace blink
    const graceActive = now < shieldGraceUntil && !invin;
    const graceAlpha = graceActive ? (Math.sin(now / 42) > 0 ? 1 : 0.4) : 1;
    ctx.globalAlpha = alpha * graceAlpha;
    ctx.fillStyle = pcol;
    ctx.shadowColor = pcol;
    ctx.shadowBlur = blur;
    ctx.arc(player.x, player.y, radius, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // shield rings
    if (shieldCount > 0) {
      for (let i = 0; i < shieldCount; i++) {
        const rr = radius + 5 + i * 4;
        const pulse = Math.sin(now / 200 + i) * 0.15 + 0.85;
        ctx.save();
        ctx.strokeStyle = `rgba(216, 222, 233, ${pulse})`;
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(player.x, player.y, rr, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    }

    // lost shield rings (red, expanding, fading)
    for (const ls of lostShields) {
      if (simActive) {
        ls.life--;
        ls.r += 1.5;
      }
      const a = Math.max(0, ls.life / ls.maxLife);
      ctx.save();
      ctx.globalAlpha = a * 0.9;
      ctx.strokeStyle = '#ff3860';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#ff3860';
      ctx.shadowBlur = 12 * a;
      ctx.beginPath();
      ctx.arc(ls.x, ls.y, ls.r, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
    if (simActive) lostShields = lostShields.filter(ls => ls.life > 0);

    // slow field tint: each active slow contributes 0.08,
    // fading linearly during its own final second
    let tintAlpha = 0;
    for (const t of slowTimers) {
      const rem = t - now;
      if (rem <= 0) continue;
      const fadeFactor = rem < SLOW_FADE_MS ? rem / SLOW_FADE_MS : 1;
      tintAlpha += 0.08 * fadeFactor;
    }
    tintAlpha = Math.min(0.24, tintAlpha);
    if (tintAlpha > 0) {
      ctx.fillStyle = `rgba(78, 245, 138, ${tintAlpha})`;
      ctx.fillRect(0, 0, W, H);
    }

    // invincibility rainbow tint — flowing multi-color bands
    const invinRem = invincibleUntil - now;
    if (invinRem > 0) {
      let invinTintAlpha = 0.06;
      if (invinRem < 1000) invinTintAlpha *= invinRem / 1000;
      const shift = (now / 12) % 360;
      const grad = ctx.createLinearGradient(0, 0, W, H);
      for (let i = 0; i <= 6; i++) {
        const hue = (shift + i * 60) % 360;
        grad.addColorStop(i / 6, `hsla(${hue}, 100%, 55%, ${invinTintAlpha})`);
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    // HUD clock icons
    drawClocks(now);

    // chain history (bottom-left)
    drawChainHistory(now);
  }

  function drawClock(cx, cy, r, fraction, colorFn) {
    // background ring
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.stroke();
    // pie fill
    ctx.fillStyle = colorFn();
    ctx.shadowColor = colorFn();
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r - 2, -Math.PI/2, -Math.PI/2 + Math.PI*2*fraction);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // outer ring
    ctx.strokeStyle = colorFn();
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  function drawClocks(now) {
    const r = 28;
    const gap = 10;
    const yTop = 58;
    const yBot = H - 58;

    // color transition helper: yellow under 1.5s, red under 0.6s
    const timerColor = (rem, normalCol) => {
      if (rem < 600) return '#ff3860';
      if (rem < 1500) return '#f5c84e';
      return normalCol;
    };

    // invincibility: top-left
    if (now < invincibleUntil) {
      const rem = invincibleUntil - now;
      const frac = invincibleTotal > 0 ? rem / invincibleTotal : 0;
      const colorFn = () => {
        if (rem < 600) return '#ff3860';
        if (rem < 1500) return '#f5c84e';
        const hue = (now / 4) % 360;
        const a = rem < 1000 ? rem / 1000 : 1;
        return `hsla(${hue}, 100%, 60%, ${a})`;
      };
      drawClock(30 + r, yTop, r, frac, colorFn);
    }

    // slow timers: top-right, stacked leftward
    const activeSlow = slowTimers.filter(t => t > now).sort((a, b) => b - a);
    let xSlow = W - 30 - r;
    for (const t of activeSlow) {
      const rem = t - now;
      const colorFn = () => timerColor(rem, '#4ef58a');
      drawClock(xSlow, yTop, r, rem / (settings.slowDuration * 1000), colorFn);
      xSlow -= r*2 + gap;
    }

    // repel timers: bottom-right, stacked leftward
    const activeRepel = repelTimers.filter(t => t > now).sort((a, b) => b - a);
    let xRepel = W - 30 - r;
    for (const t of activeRepel) {
      const rem = t - now;
      const colorFn = () => timerColor(rem, '#e84af5');
      drawClock(xRepel, yBot, r, rem / (settings.repelDuration * 1000), colorFn);
      xRepel -= r*2 + gap;
    }
  }

  function drawChainHistory(now) {
    // Determine if we should show / fade the current chain values
    let valuesAlpha = 1;
    let showValues = coinChain.collected.length > 0;
    if (!coinChain.active && coinChain.endedAt > 0) {
      const sinceEnd = now - coinChain.endedAt;
      const HOLD = 750;
      const FADE = 750;
      if (sinceEnd < HOLD) {
        valuesAlpha = 1;
      } else if (sinceEnd < HOLD + FADE) {
        valuesAlpha = 1 - (sinceEnd - HOLD) / FADE;
      } else {
        showValues = false;
        coinChain.collected = [];
      }
    }

    const x0 = 24;
    const yBaseline = H - 28;
    ctx.save();
    ctx.font = 'bold 16px ui-monospace, Menlo, Consolas, monospace';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    // completed-chain "C" badges
    let xCursor = x0;
    if (completedChains > 0) {
      ctx.fillStyle = '#ffd24a';
      ctx.shadowColor = '#ffd24a';
      ctx.shadowBlur = 10;
      for (let i = 0; i < completedChains; i++) {
        ctx.beginPath();
        ctx.arc(xCursor + 11 + i * 26, yBaseline, 11, 0, Math.PI*2);
        ctx.fill();
      }
      // draw C letters in dark
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#1a1208';
      for (let i = 0; i < completedChains; i++) {
        ctx.fillText('C', xCursor + 6 + i * 26, yBaseline + 1);
      }
      xCursor += completedChains * 26 + 8;
    }

    // current chain values
    if (showValues) {
      ctx.globalAlpha = valuesAlpha;
      ctx.fillStyle = coinChain.endedReason === 'broken' ? '#ff3860' : '#ffd24a';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 8;
      let label = coinChain.collected.map(v => v.toLocaleString()).join('  ');
      if (!coinChain.active && coinChain.endedReason === 'broken') {
        label += '  — broken';
      }
      ctx.fillText(label, xCursor, yBaseline);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
