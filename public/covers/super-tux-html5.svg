      <rect x="34" y="214" width="102" height="44" rx="12" fill="url(#ice)" />
      <rect x="148" y="178" width="102" height="80" rx="12" fill="url(#ice)" />
      <rect x="262" y="142" width="102" height="116" rx="12" fill="url(#ice)" />
      <rect x="226" y="106" width="102" height="44" rx="12" fill="#f6cf4b" />
      <ellipse cx="302" cy="272" rx="125" ry="24" fill="#09182f" opacity="0.28" />
      <g transform="translate(118 70)">
        <ellipse cx="78" cy="142" rx="70" ry="24" fill="#0a1d39" opacity="0.35" />
        <ellipse cx="82" cy="84" rx="42" ry="54" fill="#111927" />
        <ellipse cx="82" cy="90" rx="26" ry="34" fill="#f5f7fb" />
        <circle cx="53" cy="56" r="18" fill="#111927" />
        <circle cx="110" cy="56" r="18" fill="#111927" />
        <ellipse cx="82" cy="42" rx="35" ry="31" fill="#111927" />
        <ellipse cx="82" cy="52" rx="18" ry="14" fill="#f0c15a" />
        <circle cx="72" cy="40" r="4" fill="#ffffff" />
        <circle cx="92" cy="40" r="4" fill="#ffffff" />
        <ellipse cx="61" cy="150" rx="18" ry="9" fill="#f4c54d" />
