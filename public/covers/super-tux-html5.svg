    <circle cx="160" cy="92" r="5" />
    <circle cx="220" cy="142" r="4" />
    <circle cx="545" cy="210" r="4" />
    <circle cx="612" cy="248" r="5" />
    <circle cx="655" cy="194" r="4" />
  </g>

  <g transform="translate(76 208)">
