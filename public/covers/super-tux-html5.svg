<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Super Tux HTML5 cover</title>
  <desc id="desc">Snowy platformer cover with icy blocks and Super Tux HTML5 title.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8ed8ff" />
      <stop offset="100%" stop-color="#0b2f61" />
    </linearGradient>
    <linearGradient id="ice" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3fbff" />
      <stop offset="100%" stop-color="#6fd4ff" />
    </linearGradient>
  </defs>

  <rect width="720" height="900" fill="url(#sky)" />
  <circle cx="610" cy="120" r="66" fill="#f5fbff" opacity="0.9" />

  <g fill="#ffffff" opacity="0.85">
