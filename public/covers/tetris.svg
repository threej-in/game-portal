<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Tetris cover</title>
  <desc id="desc">Retro Tetris-inspired cover with falling blocks on a dark arcade background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#040814" />
      <stop offset="100%" stop-color="#172554" />
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#27406e" stroke-width="1" opacity="0.5" />
    </pattern>
  </defs>

  <rect width="720" height="900" fill="url(#bg)" />
  <rect width="720" height="900" fill="url(#grid)" />

  <g opacity="0.95">
    <rect x="150" y="155" width="72" height="72" rx="10" fill="#38bdf8" />
    <rect x="222" y="155" width="72" height="72" rx="10" fill="#38bdf8" />
    <rect x="294" y="155" width="72" height="72" rx="10" fill="#38bdf8" />
    <rect x="366" y="155" width="72" height="72" rx="10" fill="#38bdf8" />

    <rect x="258" y="267" width="72" height="72" rx="10" fill="#facc15" />
    <rect x="330" y="267" width="72" height="72" rx="10" fill="#facc15" />
    <rect x="258" y="339" width="72" height="72" rx="10" fill="#facc15" />
    <rect x="330" y="339" width="72" height="72" rx="10" fill="#facc15" />

    <rect x="438" y="255" width="72" height="72" rx="10" fill="#fb7185" />
    <rect x="438" y="327" width="72" height="72" rx="10" fill="#fb7185" />
    <rect x="510" y="327" width="72" height="72" rx="10" fill="#fb7185" />
    <rect x="510" y="399" width="72" height="72" rx="10" fill="#fb7185" />

    <rect x="138" y="471" width="72" height="72" rx="10" fill="#4ade80" />
    <rect x="210" y="471" width="72" height="72" rx="10" fill="#4ade80" />
    <rect x="210" y="543" width="72" height="72" rx="10" fill="#4ade80" />
    <rect x="282" y="543" width="72" height="72" rx="10" fill="#4ade80" />

    <rect x="402" y="531" width="72" height="72" rx="10" fill="#a78bfa" />
    <rect x="474" y="531" width="72" height="72" rx="10" fill="#a78bfa" />
    <rect x="546" y="531" width="72" height="72" rx="10" fill="#a78bfa" />
    <rect x="474" y="603" width="72" height="72" rx="10" fill="#a78bfa" />
  </g>

  <text x="74" y="778" fill="#f8fafc" font-family="Trebuchet MS, Verdana, sans-serif" font-size="124" font-weight="700" letter-spacing="6">
    TETRIS
  </text>
  <text x="78" y="834" fill="#93c5fd" font-family="Trebuchet MS, Verdana, sans-serif" font-size="28" font-weight="700" letter-spacing="7">
    ARCADE STACKER
  </text>
</svg>
