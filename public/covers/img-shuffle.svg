<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Img Shuffle cover</title>
  <desc id="desc">A colorful shuffled image puzzle cover.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2a3a"/>
      <stop offset=".55" stop-color="#274967"/>
      <stop offset="1" stop-color="#101923"/>
    </linearGradient>
    <linearGradient id="tileA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffcf5b"/>
      <stop offset="1" stop-color="#f45f7a"/>
    </linearGradient>
    <linearGradient id="tileB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#50e3c2"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="tileC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#020712" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <g opacity=".22">
    <circle cx="110" cy="130" r="90" fill="#50e3c2"/>
    <circle cx="680" cy="230" r="130" fill="#ffcf5b"/>
    <circle cx="610" cy="845" r="160" fill="#c084fc"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="118" y="162" width="250" height="250" rx="28" fill="url(#tileA)" transform="rotate(-5 243 287)"/>
    <rect x="404" y="134" width="250" height="250" rx="28" fill="url(#tileB)" transform="rotate(7 529 259)"/>
    <rect x="146" y="446" width="250" height="250" rx="28" fill="url(#tileC)" transform="rotate(4 271 571)"/>
    <rect x="432" y="430" width="250" height="250" rx="28" fill="#f8fafc" transform="rotate(-6 557 555)"/>
  </g>
  <path d="M210 290c58-92 156-104 244-42 53 38 88 40 140 12" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" opacity=".76"/>
  <path d="M214 588c69-42 128-31 178 27 47 54 105 65 177 26" fill="none" stroke="#111827" stroke-width="18" stroke-linecap="round" opacity=".72"/>
  <g fill="#fff" font-family="Verdana, sans-serif" text-anchor="middle">
    <text x="400" y="795" font-size="78" font-weight="700">IMG</text>
    <text x="400" y="870" font-size="70" font-weight="700">SHUFFLE</text>
  </g>
</svg>
